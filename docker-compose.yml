# Local "real but local" stack: Postgres (pgvector) + Redis + API + worker.
#
# SCALE TOPOLOGY (mirrors production intent):
#   - postgres: durable state (pgvector extension ready for a prod vector store)
#   - redis:    event bus (Streams) + cache
#   - api:      stateless web tier — scale with `--scale api=N`
#   - worker:   heavy/slow work tier — scale with `--scale worker=N`
# api and worker are the SAME image, different command. Both are stateless, so
# they scale horizontally; all shared state lives in postgres/redis.
#
# Run:   docker compose up --build
# Scale: docker compose up --scale api=3 --scale worker=2

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: curveai
      POSTGRES_PASSWORD: curveai
      POSTGRES_DB: curveai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curveai"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://curveai:curveai@postgres:5432/curveai
      REDIS_URL: redis://redis:6379
      EVENT_BUS_BACKEND: redis
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Container-native health check hits the readiness probe.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: ./backend
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://curveai:curveai@postgres:5432/curveai
      REDIS_URL: redis://redis:6379
      EVENT_BUS_BACKEND: redis
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
